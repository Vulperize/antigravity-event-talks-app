<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Dashboard</title>
    <meta name="description" content="Dashboard for tracking Google Cloud BigQuery Release Notes with category filters, keyboard navigation, and Twitter sharing.">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-box">BQ</div>
                <h1>BigQuery Release Notes</h1>
            </div>
            <button id="refresh-btn" class="btn-primary">
                <svg id="refresh-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                <span>Refresh</span>
            </button>
        </header>

        <!-- Controls -->
        <section class="controls-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" aria-label="Search release notes" placeholder="Search release notes...">
            </div>
            <div class="filter-wrapper" id="filters-container">
                <button class="filter-badge active" data-filter="ALL">All</button>
                <button class="filter-badge" data-filter="FEATURE">Features</button>
                <button class="filter-badge" data-filter="CHANGE">Changes</button>
                <button class="filter-badge" data-filter="DEPRECATION">Deprecations</button>
                <button class="filter-badge" data-filter="BUGFIX">Bugfixes</button>
            </div>
        </section>

        <!-- Dashboard Workspace -->
        <div class="workspace">
            <!-- Left Side Feed List -->
            <aside class="feed-sidebar">
                <div id="feed-list" class="feed-list">
                    <!-- Cards will be dynamically inserted here -->
                    <div class="loading-state">Loading release notes...</div>
                </div>
            </aside>

            <!-- Right Side Selected Note Details -->
            <main class="detail-pane" id="detail-pane">
                <div class="empty-state">
                    <h3>Select a release note</h3>
                    <p>Choose an item from the left pane to view details and tweet it.</p>
                </div>
            </main>
        </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
